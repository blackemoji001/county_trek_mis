{% extends 'base.html' %}
{% block title %}Create Route{% endblock %}
{% block page_title %}Create Route{% endblock %}
{% block content %}<div class="col-md-8 mx-auto"><div class="card modern-card"><div class="card-body"><form method="post">{% csrf_token %}<div class="row"><div class="col-md-6 mb-3"><input name="route_code" class="form-control" placeholder="Route Code" required></div><div class="col-md-6 mb-3"><input name="route_name" class="form-control" placeholder="Route Name" required></div></div><div class="row"><div class="col-md-6 mb-3"><input name="origin" class="form-control" placeholder="Origin"></div><div class="col-md-6 mb-3"><input name="destination" class="form-control" placeholder="Destination"></div></div><div class="row"><div class="col-md-4 mb-3"><select name="route_type" class="form-select"><option value="NORMAL">Normal</option><option value="EXPRESS">Express</option><option value="INTER_COUNTY">Inter-County</option></select></div><div class="col-md-4 mb-3"><input name="distance_km" type="number" step="0.1" class="form-control" placeholder="Distance (km)"></div><div class="col-md-4 mb-3"><input name="estimated_duration" class="form-control" placeholder="Duration (HH:MM:SS)"></div></div><div class="mb-3"><input name="base_fare" type="number" class="form-control" placeholder="Base Fare (KES)"></div><button type="submit" class="btn btn-success">Create Route</button></form></div></div></div>{% endblock %}
