{% extends 'base_auth.html' %}
{% block title %}Reset Password{% endblock %}
{% block auth_content %}
<div class="auth-card">
    <h2>Set New Password</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><input type="text" name="otp" class="form-control" placeholder="OTP Code" required></div>
        <div class="mb-3"><input type="password" name="new_password" class="form-control" placeholder="New Password" required></div>
        <button type="submit" class="btn btn-primary w-100">Reset Password</button>
    </form>
</div>
{% endblock %}
