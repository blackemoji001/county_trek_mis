{% extends 'base_auth.html' %}
{% block title %}Forgot Password{% endblock %}
{% block auth_content %}
<div class="auth-card">
    <h2>Forgot Password</h2>
    <p class="text-muted">Enter your registered email to receive a reset OTP.</p>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="Email" required></div>
        <button type="submit" class="btn btn-primary w-100">Send Reset OTP</button>
    </form>
    <div class="text-center mt-3"><a href="{% url 'accounts:login' %}">Back to Login</a></div>
</div>
{% endblock %}
