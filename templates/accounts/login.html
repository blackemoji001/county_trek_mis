{% extends 'base_auth.html' %}
{% load static %}
{% block title %}Login - County Trek MIS{% endblock %}
{% block auth_content %}
<div class="auth-card">
    <div class="text-center mb-4">
        <img src="{% static 'img/logo.png' %}" alt="County Trek" class="auth-logo" onerror="this.style.display='none'">
        <h2>Welcome Back</h2>
        <p class="text-muted">Sign in to continue</p>
    </div>
    <form method="post" action="{% url 'accounts:login' %}">
        {% csrf_token %}
        <div class="form-floating mb-3">
            <input type="email" name="email" id="email" class="form-control" placeholder="Email" required>
            <label for="email">Email address</label>
        </div>
        <div class="form-floating mb-3 position-relative">
            <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
            <label for="password">Password</label>
            <button type="button" class="btn btn-link password-toggle" onclick="togglePassword()">
                <i class="fas fa-eye" id="toggleIcon"></i>
            </button>
        </div>
        <div class="d-flex justify-content-between mb-3">
            <div class="form-check"><input type="checkbox" class="form-check-input" id="rememberMe" name="remember_me"><label for="rememberMe">Remember me</label></div>
            <a href="{% url 'accounts:password_reset' %}" class="text-decoration-none">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg">Sign In</button>
    </form>
    <div class="text-center mt-3">
        Don't have an account? <a href="{% url 'accounts:register_passenger' %}">Register as Passenger</a>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePassword() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('toggleIcon');
    if (pw.type === 'password') { pw.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
    else { pw.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
}
</script>
{% endblock %}
