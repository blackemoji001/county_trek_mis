{% extends 'base.html' %}
{% block title %}Create SACCO{% endblock %}
{% block page_title %}Register SACCO{% endblock %}
{% block content %}
<div class="col-md-6 mx-auto"><div class="card modern-card"><div class="card-body"><form method="post">{% csrf_token %}<div class="mb-3"><input name="name" class="form-control" placeholder="SACCO Name" required></div><div class="mb-3"><input name="registration_number" class="form-control" placeholder="Reg Number" required></div><div class="mb-3"><input name="email" type="email" class="form-control" placeholder="Email"></div><div class="mb-3"><input name="phone_number" class="form-control" placeholder="Phone"></div><div class="mb-3"><textarea name="address" class="form-control" placeholder="Address"></textarea></div><button type="submit" class="btn btn-success">Save</button></form></div></div></div>
{% endblock %}
