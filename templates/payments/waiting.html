{% extends 'base.html' %}
{% block title %}Processing Payment{% endblock %}
{% block page_title %}Awaiting Payment{% endblock %}
{% block content %}
<div class="text-center py-5"><i class="fas fa-spinner fa-pulse fa-4x text-primary mb-3"></i><h4>Please check your phone</h4><p>Enter your M-Pesa PIN to complete the payment.</p><a href="{% url 'payments:check_status' payment.id %}" class="btn btn-primary" id="checkStatus">Check Status</a></div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('checkStatus').addEventListener('click', function(e){ e.preventDefault(); fetch(this.href).then(r=>r.json()).then(d=>{ if(d.status==='COMPLETED') location.href="{% url 'payments:receipt' payment.id %}"; else if(d.status==='FAILED'){ alert('Payment failed.'); location.href="{% url 'bookings:my_bookings' %}"; } else alert('Still processing.'); }); });
</script>
{% endblock %}
