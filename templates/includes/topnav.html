{% load static %}
<header class="top-navbar">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <button class="btn btn-link d-lg-none me-2" id="sidebarToggleMobile"><i class="fas fa-bars"></i></button>
            <h5 class="page-title mb-0">{% block page_title %}{% endblock %}</h5>
        </div>
        <div class="d-flex align-items-center gap-3">
            <div class="dropdown">
                <button class="btn btn-link position-relative" data-bs-toggle="dropdown">
                    <i class="fas fa-bell"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">3</span>
                </button>
                <div class="dropdown-menu dropdown-menu-end notification-menu">
                    <h6 class="dropdown-header">Notifications</h6>
                    <a class="dropdown-item" href="#">New booking confirmed</a>
                    <a class="dropdown-item" href="#">Payment received</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="btn btn-link d-flex align-items-center" data-bs-toggle="dropdown">
                    <div class="user-avatar-sm bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width:35px;height:35px;">
                        {{ user.first_name|first }}{{ user.last_name|first }}
                    </div>
                    <span class="ms-2 d-none d-sm-inline">{{ user.first_name }}</span>
                </button>
                <div class="dropdown-menu dropdown-menu-end">
                    <a class="dropdown-item" href="{% url 'accounts:profile' %}"><i class="fas fa-user me-2"></i>Profile</a>
                    <a class="dropdown-item text-danger" href="{% url 'accounts:logout' %}"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
                </div>
            </div>
        </div>
    </div>
</header>
